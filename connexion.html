<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="favcon.png" sizes="32x32" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="base.css" />
    <title>Connexion</title>
  </head>

  <body>
    <header>
      <div class="logo">
        <img src="favcon.png" alt="logo" style="width: 70px; height: 70px" />
      </div>
      <div class="lead">
        <a href="index.html#home"
          ><div class="home center"><p>Home</p></div></a
        >
        <a href="index.html#discover"
          ><div class="discover center"><p>Découvrir</p></div></a
        >
        <div class="lead-end">
          <a href="connexion.html" class="connexion">Connexion</a>
          <a href="inscription.html" class="Inscription">Inscription</a>
        </div>
      </div>
    </header>

    <main class="inscription-page">
      <section style="height: auto; padding: 40px">
        <div class="home_card_desc">
          <h1 style="text-align: center">Connexion</h1>

          <div
            id="msg-erreur"
            style="
              color: #ff4444;
              text-align: center;
              font-weight: bold;
              height: 25px;
              margin-bottom: 10px;
            "
          ></div>
        </div>

        <form class="inscription-form" id="formLogin" style="height: auto">
          <label for="username">Nom d'utilisateur ou email :</label>
          <input type="text" id="username" name="username" required />

          <label for="password" style="margin-top: 20px">Mot de passe :</label>
          <input type="password" id="password" name="password" required />

          <button
            type="submit"
            class="home"
            style="
              border: none;
              padding: 15px 30px;
              margin-top: 30px;
              cursor: pointer;
              width: 100%;
            "
          >
            Se connecter
          </button>
        </form>
      </section>
    </main>

    <script>
      document
        .getElementById("formLogin")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const formData = new FormData(this);
          const msgDiv = document.getElementById("msg-erreur");

          try {
            const response = await fetch("src/login.php", {
              method: "POST",
              body: formData,
            });

            const result = await response.json();

            if (result.success) {
              window.location.href = "index.html";
            } else {
              msgDiv.innerText = result.message;
            }
          } catch (error) {
            msgDiv.innerText = "Erreur de communication avec le serveur.";
          }
        });
    </script>

    <footer
      class="center"
      style="
        position: fixed;
        bottom: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      "
    >
      ©Nouveau fichier
    </footer>
  </body>
</html>
